name: sneakerflash-prod

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    init: true
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set in env file}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sneaker_flash}
      MYSQL_USER: ${MYSQL_USER:-sneaker}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set in env file}
    command:
      - mysqld
      - --mysql-native-password=ON
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --skip-name-resolve
    volumes:
      - mysql:/var/lib/mysql
    networks:
      - sneaker-net
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -uroot -p"$${MYSQL_ROOT_PASSWORD}" --silent
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    stop_grace_period: 1m
    logging:
      options:
        max-size: "20m"
        max-file: "5"

  redis:
    image: redis:8.2
    restart: unless-stopped
    init: true
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set in env file}
    command:
      - /bin/sh
      - -ec
      - exec redis-server --requirepass "$${REDIS_PASSWORD}" --appendonly yes --appendfsync everysec --maxmemory-policy noeviction
    volumes:
      - redis:/data
    networks:
      - sneaker-net
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a "$${REDIS_PASSWORD}" ping | grep PONG
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    stop_grace_period: 30s
    logging:
      options:
        max-size: "20m"
        max-file: "5"

  kafka:
    image: apache/kafka:4.1.1
    restart: unless-stopped
    init: true
    ports:
      - "127.0.0.1:${KAFKA_EXTERNAL_PORT:-9092}:19092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: INTERNAL://:9092,EXTERNAL://:19092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://${KAFKA_EXTERNAL_HOST:-127.0.0.1}:${KAFKA_EXTERNAL_PORT:-9092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_NUM_PARTITIONS: ${KAFKA_NUM_PARTITIONS:-3}
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_LOG_RETENTION_HOURS: ${KAFKA_LOG_RETENTION_HOURS:-168}
      KAFKA_LOG_SEGMENT_BYTES: ${KAFKA_LOG_SEGMENT_BYTES:-1073741824}
    volumes:
      - kafka:/var/lib/kafka/data
    networks:
      - sneaker-net
    healthcheck:
      test:
        - CMD-SHELL
        - /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s
    stop_grace_period: 1m
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    logging:
      options:
        max-size: "50m"
        max-file: "5"

  kafka-init:
    image: apache/kafka:4.1.1
    restart: "no"
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - /bin/bash
      - -ec
      - >
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic ${KAFKA_TOPIC:-seckill_orders} --partitions ${KAFKA_NUM_PARTITIONS:-3} --replication-factor 1 &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic ${KAFKA_DLQ_TOPIC:-seckill-order-dlq} --partitions 1 --replication-factor 1
    networks:
      - sneaker-net

  prometheus:
    image: prom/prometheus@sha256:4a61322ac1103a0e3aea2a61ef1718422a48fa046441f299d71e660a3bc71ae9
    restart: unless-stopped
    init: true
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - sneaker-net
    logging:
      options:
        max-size: "20m"
        max-file: "5"

  grafana:
    image: grafana/grafana@sha256:e932bd6ed0e026595b08483cd0141e5103e1ab7ff8604839ff899b8dc54cabcb
    restart: unless-stopped
    init: true
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set in env file}
    volumes:
      - ./docker/grafana/datasources/prometheus.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - sneaker-net
    logging:
      options:
        max-size: "20m"
        max-file: "5"

networks:
  sneaker-net:
    driver: bridge

volumes:
  kafka:
  mysql:
  redis:
